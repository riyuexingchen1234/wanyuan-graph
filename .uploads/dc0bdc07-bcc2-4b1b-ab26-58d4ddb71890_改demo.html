<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Cosmos Graph Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #000000; }
  canvas { display: block; }
  #info { position: fixed; top: 14px; left: 14px; z-index: 10; background: #ffffff; padding: 12px 16px; border: 1px solid #000000; font-size: 13px; line-height: 1.7; pointer-events: none; }
  #node-label { position: fixed; left: 0; top: 0; transform: translate(-50%, 0); z-index: 5; background: #ffffff; color: #000000; padding: 1px 4px; font-size: 10px; font-weight: bold; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>
<div id="info">
  <b>产业链宇宙 Demo</b><br>
  · 左键拖拽旋转 / 滚轮缩放 / 右键平移<br>
  · 仅保留一个光伏产业节点
</div>
<div id="node-label">光伏产业</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- 数据：仅保留光伏产业 ----------
const NODE = { id: 'pv', name: '光伏产业' };

// ---------- Three.js 初始化 ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ---------- 节点 ----------
const group = new THREE.Group();

const RADIUS = 0.05;
const geometry = new THREE.SphereGeometry(RADIUS, 32, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
const mesh = new THREE.Mesh(geometry, material);
group.add(mesh);

scene.add(group);

// ---------- DOM 标签跟随 ----------
const labelDiv = document.getElementById('node-label');
const labelOffset = new THREE.Vector3(0, -(RADIUS + 0.18), 0);

function updateLabelPosition() {
  group.updateMatrixWorld();
  const pos = labelOffset.clone();
  pos.applyMatrix4(group.matrixWorld);
  pos.project(camera);

  const x = (pos.x * 0.5 + 0.5) * innerWidth;
  const y = (-pos.y * 0.5 + 0.5) * innerHeight;
  labelDiv.style.left = `${x}px`;
  labelDiv.style.top = `${y}px`;
  labelDiv.style.display = pos.z > 1 ? 'none' : 'block';
}

// ---------- 动画循环 ----------
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  updateLabelPosition();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

updateLabelPosition();
tick();
</script>
</body>
</html>
