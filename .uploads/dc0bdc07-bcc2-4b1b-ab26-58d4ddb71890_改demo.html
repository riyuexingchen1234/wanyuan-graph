<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Cosmos Graph Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #000000; }
  canvas { display: block; }
  #info { position: fixed; top: 14px; left: 14px; z-index: 10; background: #ffffff; padding: 12px 16px; border: 1px solid #000000; font-size: 13px; line-height: 1.7; pointer-events: none; }
</style>
</head>
<body>
<div id="info">
  <b>产业链宇宙 Demo</b><br>
  · 左键拖拽旋转 / 滚轮缩放 / 右键平移<br>
  · 仅保留一个光伏产业节点
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- 数据：仅保留光伏产业 ----------
const NODE = { id: 'pv', name: '光伏产业' };

// ---------- Three.js 初始化 ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ---------- 标签 ----------
function makeLabel(text) {
  const c = document.createElement('canvas');
  const fs = 24;
  const ctx = c.getContext('2d');
  ctx.font = `bold ${fs}px sans-serif`;
  const w = Math.ceil(ctx.measureText(text).width) + 16;
  const h = fs + 10;
  c.width = w;
  c.height = h;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, w, h);

  ctx.font = `bold ${fs}px sans-serif`;
  ctx.fillStyle = '#000000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);

  const t = new THREE.CanvasTexture(c);
  t.minFilter = THREE.LinearFilter;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: t, transparent: true, depthTest: false }));
  sprite.scale.set(w / 32, h / 32, 1);
  return sprite;
}

// ---------- 节点 ----------
const group = new THREE.Group();

const RADIUS = 0.35;
const geometry = new THREE.SphereGeometry(RADIUS, 32, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
const mesh = new THREE.Mesh(geometry, material);
group.add(mesh);

const label = makeLabel(NODE.name);
label.position.y = -(RADIUS + 0.7);
group.add(label);

scene.add(group);

// ---------- 动画循环 ----------
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

tick();
</script>
</body>
</html>
