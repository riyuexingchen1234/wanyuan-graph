<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>产业链 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  canvas { display: block; }
  .label {
    position: fixed;
    left: 0;
    top: 0;
    transform: translate(-50%, 0);
    z-index: 5;
    background: #ffffff;
    color: #000000;
    padding: 1px 5px;
    font-size: 12px;
    font-weight: bold;
    pointer-events: none;
    white-space: nowrap;
  }
  #info {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 10;
    background: #ffffff;
    padding: 10px 14px;
    border: 1px solid #000000;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">
  <b>产业链 Demo</b><br>
  左键拖拽旋转 · 滚轮缩放 · 右键平移
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- 配置 ----------
const NODE_RADIUS = 0.08;
const LABEL_OFFSET = 0.25;
const BASE_DISTANCE = 10;

// ---------- 数据 ----------
const NODES = [
  { name: '光伏产业', x: -1.5, y: 0, z: 0 },
  { name: '光伏电池片', x: 1.5, y: 0, z: 0 },
];

// ---------- 场景 ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 0, BASE_DISTANCE);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ---------- 创建节点 ----------
const geometry = new THREE.SphereGeometry(NODE_RADIUS, 32, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
const objects = [];

NODES.forEach((n) => {
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(n.x, n.y, n.z);
  scene.add(mesh);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = n.name;
  document.body.appendChild(label);

  objects.push({ mesh, label });
});

// ---------- 更新标签 ----------
function updateLabels() {
  const d = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
  const scale = BASE_DISTANCE / Math.max(d, 0.1);

  objects.forEach(({ mesh, label }) => {
    const pos = mesh.position.clone();
    pos.y -= LABEL_OFFSET * scale;
    pos.project(camera);

    const x = (pos.x * 0.5 + 0.5) * innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * innerHeight;

    label.style.left = `${x}px`;
    label.style.top = `${y}px`;
    label.style.display = pos.z > 1 ? 'none' : 'block';
    label.style.fontSize = `${Math.max(12 * scale, 4)}px`;
  });
}

// ---------- 动画 ----------
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

updateLabels();
tick();
</script>
</body>
</html>
